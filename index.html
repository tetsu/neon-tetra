<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetra</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <canvas id="game-canvas" width="300" height="600"></canvas>
        <div id="ui-overlay">
            <div id="score-board">
                <div class="label">SCORE</div>
                <div id="score">0</div>
            </div>
            <div id="level-board">
                <div class="label">LEVEL</div>
                <div id="level">1</div>
            </div>
            <div id="next-piece-box">
                <div class="label">NEXT</div>
                <canvas id="next-canvas" width="120" height="120"></canvas>
            </div>
        </div>
        <div id="glitch-overlay" class="hidden">WARNING: GLITCH DETECTED</div>
        <div id="game-over-overlay" class="hidden">
            <h1>GAME OVER</h1>
            <p>Score: <span id="final-score">0</span></p>
            <p>Press SPACE to Restart</p>
        </div>
        <div id="title-screen-overlay">
            <h1 class="neon-title">
                <span style="--i:1">N</span><span style="--i:2">E</span><span style="--i:3">O</span><span
                    style="--i:4">N</span>
                <br>
                <span class="magenta" style="--i:5">T</span><span class="magenta" style="--i:6">E</span><span
                    class="magenta" style="--i:7">T</span><span class="magenta" style="--i:8">R</span><span
                    class="magenta" style="--i:9">A</span>
            </h1>
            <p class="start-prompt">Press SPACE to Start</p>
            <div class="floating-blocks">
                <div class="f-block cyan"></div>
                <div class="f-block magenta"></div>
                <div class="f-block yellow"></div>
            </div>
        </div>
    </div>
    <script src="js/tetrominoes.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
</body>

</html>
